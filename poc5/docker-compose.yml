version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────
  # Message Broker
  # ─────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    healthcheck:
      test: rabbitmq-diagnostics ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cqrs-network

  # ─────────────────────────────────────────────────────────────
  # OrderDB (Write-Side Database)
  # ─────────────────────────────────────────────────────────────
  orderdb:
    image: postgres:15
    container_name: orderdb
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: orderuser
      POSTGRES_PASSWORD: orderpass
    ports:
      - "5433:5432"
    volumes:
      - orderdb_data:/var/lib/postgresql/data
      - ./order-service/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderuser -d orderdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cqrs-network

  # ─────────────────────────────────────────────────────────────
  # ReportingDB (Read-Side Database)
  # ─────────────────────────────────────────────────────────────
  reportingdb:
    image: postgres:15
    container_name: reportingdb
    environment:
      POSTGRES_DB: reportingdb
      POSTGRES_USER: reportinguser
      POSTGRES_PASSWORD: reportingpass
    ports:
      - "5434:5432"
    volumes:
      - reportingdb_data:/var/lib/postgresql/data
      - ./reporting-service/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reportinguser -d reportingdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cqrs-network

  # ─────────────────────────────────────────────────────────────
  # Order Service (Write-Side)
  # ─────────────────────────────────────────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    environment:
      ORDERDB_HOST: orderdb
      ORDERDB_NAME: orderdb
      ORDERDB_USER: orderuser
      ORDERDB_PASSWORD: orderpass
      ORDERDB_PORT: 5432
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      FLASK_ENV: production
    ports:
      - "5001:5001"
    depends_on:
      rabbitmq:
        condition: service_healthy
      orderdb:
        condition: service_healthy
    networks:
      - cqrs-network
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # Reporting Service (Read-Side)
  # ─────────────────────────────────────────────────────────────
  reporting-service:
    build:
      context: ./reporting-service
      dockerfile: Dockerfile
    container_name: reporting-service
    environment:
      REPORTINGDB_HOST: reportingdb
      REPORTINGDB_NAME: reportingdb
      REPORTINGDB_USER: reportinguser
      REPORTINGDB_PASSWORD: reportingpass
      REPORTINGDB_PORT: 5432
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      FLASK_ENV: production
    ports:
      - "5002:5002"
    depends_on:
      rabbitmq:
        condition: service_healthy
      reportingdb:
        condition: service_healthy
    networks:
      - cqrs-network
    restart: unless-stopped

networks:
  cqrs-network:
    driver: bridge

volumes:
  orderdb_data:
  reportingdb_data:
